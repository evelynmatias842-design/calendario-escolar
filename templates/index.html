<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Escolar</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/locales/es.js'></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            display: flex;
            max-width: 1200px;
            width: 100%;
            gap: 20px;
        }
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin-top: 0;
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fcfcfc;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .btn-guardar {
            width: 100%;
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-guardar:hover {
            background-color: #4338ca;
        }
        .countdown-card {
            border-top: 4px solid #ef4444;
        }
        .main-content {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2.title {
            text-align: center;
            color: #4f46e5;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="card">
                <h3>Añadir Evento</h3>
                <form id="eventoForm">
                    <div class="form-group">
                        <label>Título</label>
                        <input type="text" id="titulo" placeholder="ej. graduación" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo (Color)</label>
                        <select id="color">
                            <option value="#10b981">Personal (Verde)</option>
                            <option value="#3b82f6">Escolar (Azul)</option>
                            <option value="#f59e0b">Examen (Amarillo)</option>
                        </select>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="urgente">
                        <label for="urgente">🚨 Marcar como Urgente</label>
                    </div>
                    <button type="submit" class="btn-guardar">Guardar</button>
                </form>
            </div>

            <div class="card countdown-card">
                <h3>🚨 Cuenta Regresiva</h3>
                <div id="cuentaRegresivaText" style="color: #666; font-style: italic; font-size: 14px;">
                    No hay tareas urgentes marcadas.
                </div>
            </div>
        </div>

        <div class="main-content">
            <h2 class="title">📅 Calendario Escolar</h2>
            <div id='calendar'></div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            editable: true,
            events: '/api/events'
        });
        
        calendar.render();

        // Guardar el evento al pulsar el botón morado
        document.getElementById('eventoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var tituloInput = document.getElementById('titulo').value;
            var fechaInput = document.getElementById('fecha').value;
            var colorInput = document.getElementById('color').value;
            var esUrgente = document.getElementById('urgente').checked;

            var nuevoEvento = {
                title: tituloInput,
                start: fechaInput,
                color: colorInput,
                extendedProps: {
                    urgente: esUrgente
                }
            };

            fetch('/api/events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoEvento)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    alert('✅ ¡Evento guardado correctamente!');
                    calendar.refetchEvents(); // Actualiza el calendario en el momento
                    document.getElementById('eventoForm').reset();
                } else {
                    alert('❌ Error al guardar en servidor: ' + data.message);
                }
            })
            .catch(error => {
                alert('❌ Error de conexión con Render.');
            });
        });
    });
    </script>
</body>
</html>
