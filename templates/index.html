<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calendario Escolar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        .fc-event { cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto p-4 md:p-6">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">📅 Calendario Escolar</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6">
                
                <div class="bg-white p-5 rounded-xl shadow-md">
                    <h2 class="text-lg font-bold mb-4 text-gray-700">Añadir Evento</h2>
                    <form id="eventForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase">Título</label>
                            <input type="text" id="title" required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase">Fecha</label>
                            <input type="date" id="date" required class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase">Tipo (Color)</label>
                            <select id="category" class="w-full mt-1 p-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="tarea">Tarea (Azul)</option>
                                <option value="examen">Examen (Rojo)</option>
                                <option value="personal">Personal (Verde)</option>
                            </select>
                        </div>
                        <div class="flex items-center pt-2">
                            <input type="checkbox" id="urgent" class="h-4 w-4 text-indigo-600 border-gray-300 rounded">
                            <label for="urgent" class="ml-2 text-sm text-gray-700 font-medium">🚨 Marcar como Urgente</label>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Guardar</button>
                    </form>
                </div>

                <div class="bg-white p-5 rounded-xl shadow-md border-t-4 border-red-500">
                    <h2 class="text-lg font-bold mb-3 text-red-600 flex items-center gap-1">🚨 Cuenta Regresiva</h2>
                    <div id="countdownList" class="space-y-3 max-h-72 overflow-y-auto">
                        </div>
                </div>

            </div>

            <div class="lg:col-span-3 bg-white p-5 rounded-xl shadow-md">
                <div id="calendar"></div>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let urgentEvents = [];

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            
            // Configurar el calendario visual
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es', // Idioma español
                events: '/api/events', // De dónde saca los datos
                eventClick: function(info) {
                    if (confirm(`¿Quieres borrar el evento "${info.event.title}"?`)) {
                        deleteEvent(info.event.id);
                    }
                }
            });
            
            calendar.render();
            loadUrgentCountdowns();

            // Enviar formulario al servidor
            document.getElementById('eventForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const title = document.getElementById('title').value;
                const start = document.getElementById('date').value;
                const category = document.getElementById('category').value;
                const urgent = document.getElementById('urgent').checked;

                fetch('/api/events', {fetch('/api/events', {  // <-- Si en app.py dice 'eventos', aquí también debe decir 'eventos'
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify(nuevoEvento)
})
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, start, category, urgent })
                })
                .then(res => res.json())
                .then(() => {
                    calendar.refetchEvents(); // Recarga el calendario
                    loadUrgentCountdowns();  // Recarga las cuentas regresivas
                    document.getElementById('eventForm').reset(); // Limpia el formulario
                });
            });

            // Actualizar el reloj de cuenta regresiva cada 1 segundo
            setInterval(updateCountdowns, 1000);
        });

        function deleteEvent(id) {
            fetch(`/api/events/${id}`, { method: 'DELETE' })
            .then(() => {
                calendar.refetchEvents();
                loadUrgentCountdowns();
            });
        }

        function loadUrgentCountdowns() {
            fetch('/api/events')
            .then(res => res.json())
            .then(events => {
                urgentEvents = events.filter(e => e.urgent);
                updateCountdowns();
            });
        }

        function updateCountdowns() {
            const listEl = document.getElementById('countdownList');
            if (urgentEvents.length === 0) {
                listEl.innerHTML = '<p class="text-gray-400 text-sm italic">No hay tareas urgentes marcadas.</p>';
                return;
            }

            let html = '';
            const now = new Date().getTime();

            urgentEvents.forEach(event => {
                // Forzar que la fecha se tome a la medianoche local para evitar desfases de zona horaria
                const eventDate = new Date(event.start + 'T00:00:00').getTime();
                const distance = eventDate - now;

                let countdownText = "";
                if (distance < 0) {
                    countdownText = "⚠️ ¡Tiempo cumplido o es hoy!";
                } else {
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                    countdownText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
                }

                html += `
                    <div class="p-3 bg-red-50 border-l-4 border-red-500 rounded-r-lg">
                        <p class="font-semibold text-gray-800 text-sm">${event.title}</p>
                        <p class="text-xs text-gray-500">Fecha límite: ${event.start}</p>
                        <p class="text-xs font-mono font-bold text-red-600 mt-1 bg-red-100 px-2 py-0.5 rounded inline-block">${countdownText}</p>
                    </div>
                `;
            });

            listEl.innerHTML = html;
        }
    </script>
    <script>
document.addEventListener('DOMContentLoaded', function() { 
    var calendarEl = document.getElementById('calendar'); 
    var calendar = new FullCalendar.Calendar(calendarEl, { 
        initialView: 'dayGridMonth', 
        locale: 'es', 
        selectable: true, 
        editable: true, 
        events: '/api/eventos', 
        select: function(info) { 
            var titulo = prompt('Escribe el título del evento o examen:'); 
            if (titulo) { 
                var nuevoEvento = { title: titulo, start: info.startStr, end: info.endStr }; 
                fetch('/api/eventos', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(nuevoEvento) 
                })
                .then(response => response.json())
                .then(data => { 
                    calendar.refetchEvents(); 
                }); 
            } 
            calendar.unselect(); 
        } 
    }); 
    calendar.render(); 
});
</script>
